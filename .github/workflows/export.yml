name: "Export Game"

on:
  push:
    branches: [ "main" ]

jobs:
  export-linux:
    name: Export Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_linux_x86_64.zip
          unzip Godot_v4.5.1-stable_mono_linux_x86_64.zip
          cp -r Godot_v4.5.1-stable_mono_linux_x86_64/* .
          mv Godot_v4.5.1-stable_mono_linux.x86_64 godot
          chmod +x godot

      - name: .NET Restore
        run: dotnet restore

      - name: Install Export Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable.mono
          unzip Godot_v4.5.1-stable_mono_export_templates.tpz -d templates_temp
          mv templates_temp/templates/* ~/.local/share/godot/export_templates/4.5.1.stable.mono/
          rm -rf templates_temp Godot_v4.5.1-stable_mono_export_templates.tpz

      - name: Export Linux
        run: |
          mkdir -p builds/linux
          ./godot --headless --path . --export-release "Linux" builds/linux/InatelRunner.x86_64

      - name: Build Linux Installer (.deb)
        run: |
          cd installer
          chmod +x build_deb.sh
          ./build_deb.sh

      - name: Upload Linux Installer
        uses: actions/upload-artifact@v4
        with:
          name: InatelRunner-Linux-Installer
          path: builds/installer/InatelRunner_Linux.deb
          retention-days: 7

  export-windows:
    name: Export Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Godot
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_win64.zip" -OutFile "Godot.zip"
          Expand-Archive -Path "Godot.zip" -DestinationPath "GodotTemp"
          Copy-Item -Path "GodotTemp/Godot_v4.5.1-stable_mono_win64/*" -Destination "." -Recurse
          Rename-Item -Path "Godot_v4.5.1-stable_mono_win64.exe" -NewName "godot.exe"
          Remove-Item -Path "GodotTemp" -Recurse -Force
          Remove-Item -Path "Godot.zip" -Force

      - name: .NET Restore
        run: dotnet restore

      - name: Install Export Templates
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_export_templates.tpz" -OutFile "Templates.zip"
          $templatesDir = "$env:APPDATA\Godot\export_templates\4.5.1.stable.mono"
          New-Item -ItemType Directory -Force -Path $templatesDir
          Expand-Archive -Path "Templates.zip" -DestinationPath "templates_temp"
          Copy-Item -Path "templates_temp/templates/*" -Destination $templatesDir -Recurse
          Remove-Item -Path "templates_temp" -Recurse -Force
          Remove-Item -Path "Templates.zip" -Force

      - name: Export Windows
        run: |
          mkdir builds\windows
          .\godot.exe --headless --path . --export-release "Windows" builds\windows\InatelRunner.exe

      - name: Build Windows Installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/windows.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: InatelRunner-Windows-Installer
          path: builds/installer/InatelRunner_Setup.exe
          retention-days: 7
