name: "Export Game"

on:
  push:
    branches: [ "main" ]

jobs:
  export-linux:
    name: Export Linux
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      DOTNET_ROLL_FORWARD: LatestPatch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1-stable
          use-dotnet: true
          include-templates: true

      - name: Install Virtual Display
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Clean Stale Import Metadata
        run: |
          find . -name "*.import" -not -path "./.godot/*" -delete
          rm -rf .godot/
          echo "Removed stale .import files and .godot cache"

      - name: Build .NET Assemblies
        run: dotnet build

      - name: Import Project (with virtual display)
        run: xvfb-run godot --headless --editor --quit

      - name: Export Linux Build
        run: |
          mkdir -p builds/linux
          xvfb-run godot --headless --path . --export-release "Linux" builds/linux/InatelRunner.x86_64

      - name: Verify Linux Export
        run: |
          if [ ! -f "builds/linux/InatelRunner.x86_64" ]; then
            echo "::error::O executável do Linux não foi gerado!"
            exit 1
          fi
          echo "✅ builds/linux/InatelRunner.x86_64 ($(du -h builds/linux/InatelRunner.x86_64 | cut -f1))"

      - name: Build Linux Installer (.deb)
        run: |
          cd installer
          chmod +x build_deb.sh
          ./build_deb.sh

      - name: Upload Linux Installer
        uses: actions/upload-artifact@v4
        with:
          name: InatelRunner-Linux-Installer
          path: builds/installer/InatelRunner_Linux.deb
          retention-days: 7

  export-windows:
    name: Export Windows
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      DOTNET_ROLL_FORWARD: LatestPatch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1-stable
          use-dotnet: true
          include-templates: true

      - name: Clean Stale Import Metadata
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter "*.import" | Where-Object { $_.FullName -notlike "*\.godot\*" } | Remove-Item -Force
          if (Test-Path ".godot") { Remove-Item -Recurse -Force ".godot" }
          Write-Host "Removed stale .import files and .godot cache"

      - name: Build .NET Assemblies
        run: dotnet build

      - name: Import Project
        shell: bash
        run: godot --headless --editor --quit

      - name: Export Windows Build
        shell: bash
        run: |
          mkdir -p builds/windows
          godot --headless --path . --export-release "Windows" builds/windows/InatelRunner.exe

      - name: Verify Windows Export
        shell: pwsh
        run: |
          if (!(Test-Path "builds\windows\InatelRunner.exe")) {
            Write-Error "O executável do Windows não foi gerado!"
            exit 1
          }
          $size = (Get-Item "builds\windows\InatelRunner.exe").Length / 1MB
          Write-Host "✅ InatelRunner.exe ($([math]::Round($size, 1)) MB)"

      - name: Build Windows Installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/windows.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: InatelRunner-Windows-Installer
          path: builds/installer/InatelRunner_Setup.exe
          retention-days: 7
