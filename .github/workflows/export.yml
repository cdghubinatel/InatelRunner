name: "Export Game"

on:
  push:
    branches: [ "main" ]

jobs:
  export-linux:
    name: Export Linux
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1-stable
          use-dotnet: true
          include-templates: true

      - name: Verify Godot Installation
        shell: bash
        run: godot --version

      - name: Restore .NET Dependencies
        run: dotnet restore

      - name: Generate .NET Bindings
        shell: bash
        run: godot --headless --build-solutions --quit || exit 0

      - name: Build .NET Project
        run: dotnet build --configuration Release

      - name: Export Linux Build
        shell: bash
        run: |
          mkdir -p builds/linux
          godot --headless --path . --export-release "Linux" builds/linux/InatelRunner.x86_64 || exit 0

      - name: Verify Linux Export
        run: |
          if [ ! -f "builds/linux/InatelRunner.x86_64" ]; then
            echo "::error::O executável do Linux não foi gerado!"
            exit 1
          fi
          echo "✅ builds/linux/InatelRunner.x86_64 ($(du -h builds/linux/InatelRunner.x86_64 | cut -f1))"

      - name: Build Linux Installer (.deb)
        run: |
          cd installer
          chmod +x build_deb.sh
          ./build_deb.sh

      - name: Upload Linux Installer
        uses: actions/upload-artifact@v4
        with:
          name: InatelRunner-Linux-Installer
          path: builds/installer/InatelRunner_Linux.deb
          retention-days: 7

  export-windows:
    name: Export Windows
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1-stable
          use-dotnet: true
          include-templates: true

      - name: Verify Godot Installation
        shell: bash
        run: godot --version

      - name: Restore .NET Dependencies
        run: dotnet restore

      - name: Generate .NET Bindings
        shell: bash
        run: godot --headless --build-solutions --quit || exit 0

      - name: Build .NET Project
        run: dotnet build --configuration Release

      - name: Export Windows Build
        shell: bash
        run: |
          mkdir -p builds/windows
          godot --headless --path . --export-release "Windows" builds/windows/InatelRunner.exe || exit 0

      - name: Verify Windows Export
        shell: pwsh
        run: |
          if (!(Test-Path "builds\windows\InatelRunner.exe")) {
            Write-Error "O executável do Windows não foi gerado!"
            exit 1
          }
          $size = (Get-Item "builds\windows\InatelRunner.exe").Length / 1MB
          Write-Host "✅ InatelRunner.exe ($([math]::Round($size, 1)) MB)"

      - name: Build Windows Installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/windows.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: InatelRunner-Windows-Installer
          path: builds/installer/InatelRunner_Setup.exe
          retention-days: 7
